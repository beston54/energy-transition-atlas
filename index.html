<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Energy Transition Atlas</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="description" content="Explore 353 proven practices for decarbonising energy, protecting nature, and improving lives. A searchable atlas by GINGR, RGI & IUCN." />
  <meta property="og:title" content="Energy Transition Atlas" />
  <meta property="og:description" content="Explore 353 proven practices for decarbonising energy, protecting nature, and improving lives." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://renewablesgridinitiative.github.io/energy-transition-atlas/" />
  <meta property="og:image" content="https://renewablesgridinitiative.github.io/energy-transition-atlas/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://renewablesgridinitiative.github.io/energy-transition-atlas/og-image.png" />
  <meta name="twitter:title" content="Energy Transition Atlas" />
  <meta name="twitter:description" content="Explore 353 proven practices for decarbonising energy, protecting nature, and improving lives." />

  <!--
    Content Security Policy. `'unsafe-inline'` on `script-src` is required by the
    Babel in-browser transpile step below (it eval()s transpiled JSX). The real
    protection here is the `script-src` allowlist: no external script host other
    than Tailwind Play, unpkg, and jsdelivr can execute. Tailwind Play is not
    pinned because it serves dynamically-compiled CSS and cannot support SRI.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://unpkg.com https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' data: https:;
    connect-src 'self' https://api.github.com https://raw.githubusercontent.com;
    frame-ancestors 'none';
    base-uri 'self';
  " />

  <!-- Tailwind CSS (CDN play/script version — no SRI possible: dynamic compile) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (pinned for SRI) -->
  <script crossorigin="anonymous" src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" integrity="sha384-DGyLxAyjq0f9SPpVevD6IgztCFlnMF6oW/XQGmfe+IsZ8TqEiDrcHkMLKI6fiB/Z"></script>
  <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" integrity="sha384-gTGxhz21lVGYNMcdJOyq01Edg0jhn/c22nsx0kyqP0TxaV5WVdsSH1fSDUf5YJj1"></script>

  <!-- Babel standalone – enables <script type="text/babel"> (pinned for SRI) -->
  <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js" integrity="sha384-wVDXnilITixWtkFWH+Xu4zp0L3R7zd39Il4szMJlz9M3Vhsuerfbxy5ojdJdqOEX"></script>

  <!-- DOMPurify — sanitises runtime-rendered HTML from admin-config.json -->
  <script crossorigin="anonymous" src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js" integrity="sha384-XQqX/4yiUGu+oyr87jvWzRuqBUK/adrY0DunhL+tID9m/9dwSpV8h9Fk/Sg6ifVQ"></script>

  <style>
    /* guarantee full-viewport rendering */
    html, body, #root { margin: 0; padding: 0; min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!--
    Shim: Babel standalone runs in global scope, so ES-module
    import/export syntax must be replaced.  We expose the React
    hooks the component expects, load the JSX source via fetch,
    strip the import/export lines, and eval through Babel.
  -->
  <script type="text/babel" data-type="module">
    // ── Destructure the hooks the component uses ──
    const { useState, useMemo, useRef, useEffect, useCallback } = React;

    // ── Fetch the JSX source, patch it, and run it ──
    // cache: 'no-store' — bypass HTTP cache entirely. 'no-cache' only forces
    // revalidation, and browsers can still serve a stale body when the CDN
    // returns 304. With JSX served unhashed from GH Pages, the safer choice
    // is to refetch every page load so admin/dev redeploys appear immediately.
    // Cache-busting query string defends against intermediaries that ignore
    // the Cache-Control hint.
    fetch("EnergyTransitionAtlas.jsx?_=" + Date.now(), { cache: "no-store" })
      .then(r => {
        if (!r.ok) throw new Error("Failed to load JSX: " + r.status);
        return r.text();
      })
      .then(source => {
        // Remove the ES-module import line
        source = source.replace(
          /^import\s*\{[^}]*\}\s*from\s*["']react["'];?\s*$/m,
          "// (import removed – hooks provided by shim)"
        );
        // Replace "export default function X()" with "function X()"
        source = source.replace(
          /^export\s+default\s+function\s+/m,
          "function "
        );

        // Transform JSX → JS via Babel
        const transformed = Babel.transform(source, {
          presets: ["react"],
          filename: "EnergyTransitionAtlas.jsx",
        }).code;

        // Evaluate the transformed code to define the component
        // in this closure (it can see useState, etc.)
        const Component = new Function(
          "React",
          "useState",
          "useMemo",
          "useRef",
          "useEffect",
          "useCallback",
          transformed + "\nreturn EnergyTransitionAtlas;"
        )(React, useState, useMemo, useRef, useEffect, useCallback);

        // Mount it
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(React.createElement(Component));
      })
      .catch(err => {
        document.getElementById("root").innerHTML =
          '<pre style="color:red;padding:2rem;">' + err + "</pre>";
        console.error(err);
      });
  </script>
</body>
</html>
